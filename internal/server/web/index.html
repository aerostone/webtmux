<script>
// Minimal Sentry-compatible error reporter (~1.5KB)
(function(){
  const DSN='REDACTED_DSN';
  const p=DSN.split('@');
  const key=p[0];
  const hostPath=p[1].split('/');
  const host=hostPath[0];
  const pid=hostPath[1];
  const endpoint='https://'+host+'/api/'+pid+'/store/';
  let lastSend=0;
  function uuid(){return Array.from(crypto.getRandomValues(new Uint8Array(16)),b=>b.toString(16).padStart(2,'0')).join('')}
  function send(ev){
    const now=Date.now();if(now-lastSend<5000)return;lastSend=now;
    const body=JSON.stringify({event_id:uuid(),timestamp:new Date().toISOString(),level:'error',platform:'javascript',
      sdk:{name:'webtmux-mini-sentry',version:'1.0.0'},
      exception:{values:[{type:ev.type||'Error',value:ev.message||'',stacktrace:{frames:ev.frames||[]}}]},
      message:ev.message||'',tags:{source:ev.source||''}});
    fetch(endpoint,{method:'POST',credentials:'omit',headers:{'Content-Type':'application/json'},body:body}).catch(()=>{});
  }
  window.onerror=function(msg,src,line,col,err){
    const frames=[];
    if(err&&err.stack){
      err.stack.split('\n').slice(1,6).forEach(l=>{
        const m=l.match(/at\s+(.+?)\s+\((.+?):(\d+):(\d+)\)/);
        frames.unshift(m?{function:m[1],filename:m[2],lineno:+m[3],colno:+m[4]}:{filename:l.trim()});
      });
    }
    send({type:'Error',message:typeof msg==='string'?msg:String(msg),source:src,frames:frames});
  };
  window.addEventListener('unhandledrejection',function(e){
    const r=e.reason;send({type:'UnhandledRejection',message:r&&(r.message||String(r))});
  });
  window.Sentry={captureException:function(e){send({type:e.name||'Error',message:e.message||String(e)})},
    captureMessage:function(m){send({type:'Message',message:m})}};
})();
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:system-ui,sans-serif;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-user-select:none;user-select:none}

/* Login */
#login-view{display:flex;align-items:center;justify-content:center;height:100vh}
#login-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:32px;width:320px;max-width:90vw}
#login-box h1{text-align:center;font-size:20px;margin-bottom:24px}
#login-box input{width:100%;padding:10px 12px;margin-bottom:12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;transition:border-color .2s}
#login-box input:focus{outline:none;border-color:#58a6ff}
#login-box input.error{border-color:#f85149;animation:shake .3s}
#login-box button{width:100%;padding:10px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;transition:all .2s;position:relative}
#login-box button:hover{background:#2ea043}
#login-box button:active{transform:scale(.98)}
#login-box button:disabled{background:#21262d;color:#484f58;cursor:not-allowed;transform:none}
#login-box button .spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
#login-box button.loading .spinner{display:inline-block}
#login-box button.loading .btn-text{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
#login-error{color:#f85149;font-size:13px;text-align:center;margin-top:8px;min-height:20px;display:flex;align-items:center;justify-content:center;gap:6px}
#login-error .error-icon{font-size:15px}
#login-success{color:#3fb950;font-size:13px;text-align:center;margin-top:8px;min-height:20px;display:flex;align-items:center;justify-content:center;gap:6px}

/* App */
#app-view{display:none;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* Header */
#header{background:#161b22;padding:6px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #30363d;flex-shrink:0;flex-wrap:nowrap;overflow:hidden}
#header h1{font-size:14px;font-weight:600;white-space:nowrap}
.btn{border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;white-space:nowrap}
.btn-green{background:#238636;color:#fff}
.btn-red{background:#da3633;color:#fff}
.btn-outline{background:transparent;color:#8b949e;border:1px solid #30363d}
.btn-blue{background:#1f6feb;color:#fff}

/* Tabs */
#tabs{display:flex;background:#161b22;border-bottom:none;flex-shrink:1;overflow-x:auto;scrollbar-width:none}
.tab{padding:6px 14px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:#8b949e;transition:all .15s}
.tab:hover{color:#c9d1d9}
.tab.active{color:#c9d1d9;border-bottom-color:#58a6ff}
.tab-content{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.tab-content.active{display:flex}

/* Terminal: fixed-height container, no resize on keyboard */
#terminal-wrap{flex:1;min-height:0;overflow:hidden;position:relative}
#terminal-container{width:100%;height:100%;overflow:hidden;touch-action:auto}
#terminal-container .xterm-viewport{overflow-y:hidden!important;overflow-x:hidden!important;scrollbar-width:none;-ms-overflow-style:none}
#terminal-container .xterm-viewport::-webkit-scrollbar{display:none}
#terminal-container .xterm-screen{overflow:hidden}

/* Toolbar */
#toolbar{background:#161b22;border-top:1px solid #30363d;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#toolbar::-webkit-scrollbar{display:none}
#toolbar-row{display:flex;padding:4px 6px;gap:3px;min-width:max-content}
.key{display:inline-flex;align-items:center;justify-content:center;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:36px;min-width:36px;transition:background .1s}
.key:active{background:#388bfd;color:#fff;border-color:#58a6ff}
.key.active-mod{background:#1f6feb;color:#fff;border-color:#58a6ff}
.key.buf-active{background:#238636;color:#fff;border-color:#2ea043}
.key.prefix-key{background:#238636;color:#fff;border-color:#2ea043;font-weight:700}
.key.special{background:#30363d;color:#f0883e;font-weight:600}

/* Modifier row */
#mod-row{background:#0d1117;border-top:1px solid #21262d;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#mod-row::-webkit-scrollbar{display:none}
#mod-row-inner{display:flex;padding:3px 6px;gap:3px;min-width:max-content}

/* Activity panel */
#activity-panel{padding:12px;overflow-y:auto;flex:1}
#activity-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
#activity-header h2{font-size:18px;font-weight:600}
.activity-item{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.activity-item:hover{border-color:#58a6ff;background:#1c2333}
.activity-item .activity-icon{display:inline-block;width:32px;height:32px;border-radius:50%;text-align:center;line-height:32px;margin-right:10px;font-size:16px}
.activity-item .activity-icon.login{background:#238636;color:#fff}
.activity-item .activity-icon.logout{background:#da3633;color:#fff}
.activity-item .activity-icon.session{background:#1f6feb;color:#fff}
.activity-item .activity-icon.file{background:#8957e5;color:#fff}
.activity-item .activity-content{display:inline-block;vertical-align:top;flex:1}
.activity-item .activity-title{font-size:14px;font-weight:500;color:#c9d1d9}
.activity-item .activity-time{font-size:12px;color:#8b949e;margin-top:2px}
.activity-item .activity-detail{font-size:13px;color:#8b949e;margin-top:4px}
.activity-item .activity-path{font-size:12px;color:#58a6ff;margin-top:2px;font-family:monospace}

/* Session panel */
#sessions-panel{padding:12px;overflow-y:auto;flex:1}
.session-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.session-card .name{font-weight:600;font-size:14px;color:#58a6ff}
.session-card .info{font-size:12px;color:#8b949e;margin-top:2px}
.session-card .actions{display:flex;gap:6px}
.session-card.attached .name::after{content:" (attached)";color:#f0883e;font-weight:400}
.create-row{display:flex;gap:8px;margin-bottom:12px}
.create-row input{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:6px 10px;font-size:13px}
.create-row input:focus{outline:none;border-color:#58a6ff}

/* Status */
#status{background:#161b22;padding:3px 10px;font-size:11px;color:#8b949e;border-top:1px solid #30363d;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}

/* Disconnect overlay */
#disconnect-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#disconnect-overlay.show{display:flex}
#disconnect-overlay .overlay-icon{font-size:48px;color:#f0883e}
#disconnect-overlay .overlay-text{font-size:16px;color:#c9d1d9}
#disconnect-overlay .overlay-sub{font-size:13px;color:#8b949e}
#disconnect-overlay .overlay-btn{padding:10px 24px;background:#1f6feb;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-top:8px}
#disconnect-overlay .overlay-btn:active{background:#388bfd}

/* File Manager Plugin */
#plugin-panel{padding:0;overflow-y:auto;flex:1}
.plugin-card{background:#161b22;border:1px solid #30363d;border-radius:8px;margin:8px;cursor:pointer;transition:background .2s}
.plugin-card:hover{background:#1c2333}
.plugin-card-header{display:flex;align-items:center;gap:12px;padding:14px}
.plugin-icon{font-size:28px;flex-shrink:0}
.plugin-info{flex:1}
.plugin-info h3{font-size:15px;color:#c9d1d9;margin:0 0 4px}
.plugin-info p{font-size:12px;color:#8b949e;margin:0}
.plugin-arrow{color:#8b949e;font-size:14px;flex-shrink:0}
#file-manager-view{display:flex;flex-direction:column;height:100%}
.fm-toolbar{display:flex;gap:4px;padding:8px;align-items:center;border-bottom:1px solid #21262d}
.fm-toolbar .key{padding:4px 8px;font-size:12px}
.fm-path{flex:1;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-size:13px;font-family:monospace}
.fm-list{flex:1;overflow-y:auto;padding:4px;min-height:200px}
.fm-item{display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer;border-radius:4px;font-size:13px;color:#c9d1d9}
.fm-item:hover{background:#161b22}
.fm-item.dir{color:#58a6ff}
.fm-item .fm-icon{width:20px;text-align:center;flex-shrink:0}
.fm-item .fm-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fm-item .fm-size{color:#8b949e;font-size:11px;flex-shrink:0;width:60px;text-align:right}
.fm-item .fm-time{color:#8b949e;font-size:11px;flex-shrink:0;width:120px;text-align:right}
.fm-item .fm-del{color:#f85149;cursor:pointer;padding:2px 6px;border-radius:4px;font-size:11px;visibility:hidden}
.fm-item:hover .fm-del{visibility:visible}
.fm-upload-area{border:2px dashed #30363d;border-radius:8px;margin:8px;padding:16px;text-align:center;color:#8b949e;font-size:12px;cursor:pointer;transition:border-color .2s}
.fm-upload-area.dragover{border-color:#58a6ff;background:rgba(88,166,255,0.05)}
.fm-upload-link{color:#58a6ff;cursor:pointer;text-decoration:underline}
.fm-status{padding:6px 8px;font-size:11px;color:#8b949e;border-top:1px solid #21262d;min-height:20px}
.fm-status.uploading{color:#d29922}
.fm-status.success{color:#3fb950}
.fm-status.error{color:#f85149}
/* Quick Commands Plugin */
.qc-toolbar{display:flex;gap:4px;padding:8px;align-items:center;border-bottom:1px solid #21262d}
.qc-toolbar .key{padding:4px 8px;font-size:12px}
.qc-list{flex:1;overflow-y:auto;padding:4px;min-height:200px}
.qc-item{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-radius:4px;font-size:13px;color:#c9d1d9;background:#161b22;margin-bottom:4px}
.qc-item:hover{background:#1c2333}
.qc-item .qc-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.qc-item .qc-cmd{flex:2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#8b949e;font-family:monospace;font-size:12px}
.qc-item .qc-run{color:#3fb950;cursor:pointer;padding:4px 8px;border-radius:4px;font-size:11px;background:rgba(63,185,80,0.1)}
.qc-item .qc-run:hover{background:rgba(63,185,80,0.2)}
.qc-item .qc-edit{color:#8b949e;cursor:pointer;padding:4px 6px;border-radius:4px;font-size:11px}
.qc-item .qc-del{color:#f85149;cursor:pointer;padding:4px 6px;border-radius:4px;font-size:11px}
.qc-status{padding:6px 8px;font-size:11px;color:#8b949e;border-top:1px solid #21262d;min-height:20px}
/* System Monitor Plugin */
.sm-toolbar{display:flex;gap:4px;padding:8px;align-items:center;border-bottom:1px solid #21262d}
.sm-toolbar .key{padding:4px 8px;font-size:12px}
.sm-toolbar .key.active{background:#238636;color:white}
.sm-dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;padding:8px;overflow-y:auto}
.sm-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px}
.sm-card-header{font-size:12px;color:#8b949e;margin-bottom:6px;font-weight:500}
.sm-metric{font-size:20px;font-weight:600;color:#c9d1d9;margin-bottom:8px}
.sm-bar{height:6px;background:#21262d;border-radius:3px;overflow:hidden}
.sm-bar-fill{height:100%;background:#58a6ff;border-radius:3px;transition:width 0.3s ease}
.sm-status{padding:6px 8px;font-size:11px;color:#8b949e;border-top:1px solid #21262d;min-height:20px}

@media(max-width:768px){
  #header{padding:5px 8px;gap:6px}
  #header h1{font-size:13px}
  .key{padding:5px 8px;font-size:11px;min-height:34px}
}
</style>
</head>
<body>

<div id="login-view">
  <div id="login-box">
    <h1>🔒 webtmux</h1>
    <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password">
    <input id="login-totp" type="text" placeholder="TOTP Code (if enabled)" inputmode="numeric" pattern="[0-9]*" maxlength="6" style="display:none">
    <button id="login-btn"><span class="spinner"></span><span class="btn-text">Login</span></button>
    <button id="fingerprint-btn" style="display:none;margin-top:10px;width:100%;padding:10px;background:#161b22;color:#58a6ff;border:1px solid #30363d;border-radius:6px;font-size:14px;cursor:pointer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4"/><path d="M14 13.12c0 2.38 0 6.38-1 8.88"/><path d="M17.29 21.02c.12-.6.43-2.3.5-3.02"/><path d="M2 12a10 10 0 0 1 18-6"/><path d="M2 16h.01"/><path d="M21.8 16c.2-2 .131-5.354 0-6"/><path d="M5 19.5C5.5 18 6 15 6 12a6 6 0 0 1 .34-2"/><path d="M8.65 22c.21-.66.45-1.32.57-2"/><path d="M9 6.8a6 6 0 0 1 9 5.2v2"/></svg>
      指纹登录
    </button>
    <div id="login-error"></div>
    <div id="login-success"></div>
  </div>
</div>

<!-- Kill confirmation modal -->
<div id="kill-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center">
  <div style="background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;width:300px;max-width:90vw">
    <h3 style="margin-bottom:12px;font-size:16px">⚠️ 确认删除会话</h3>
    <p style="color:#8b949e;font-size:13px;margin-bottom:16px" id="kill-modal-name"></p>
    <input id="kill-modal-pass" type="password" placeholder="输入登录密码确认" style="width:100%;padding:10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;margin-bottom:8px">
    <div id="kill-modal-error" style="color:#f85149;font-size:12px;margin-bottom:8px;min-height:16px"></div>
    <div style="display:flex;gap:8px">
      <button id="kill-modal-confirm" class="btn btn-red" style="flex:1">确认删除</button>
      <button id="kill-modal-fp" class="btn btn-outline" style="flex:1;display:none">🔒 指纹确认</button>
      <button id="kill-modal-cancel" class="btn btn-outline" style="flex:1">取消</button>
    </div>
  </div>
</div>

<div id="app-view">
  <div id="header">
    <h1>webtmux</h1>
    <div id="tabs">
      <div class="tab active" data-tab="activity">Activity</div>
      <div class="tab" data-tab="terminal">Terminal</div>
      <div class="tab" data-tab="sessions">Sessions</div>
      <div class="tab" data-tab="plugins">Plugins</div>
    </div>
    <button id="logout-btn" class="btn btn-outline" title="Logout"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>

  <!-- Activity tab (default) -->
  <div class="tab-content active" id="tab-activity">
    <div id="activity-panel">
      <div id="activity-header">
        <h2>最近活动</h2>
        <button class="btn btn-outline" id="refresh-activity">刷新</button>
      </div>
      <div id="activity-list"></div>
      <div id="activity-empty" style="display:none;text-align:center;padding:40px;color:#8b949e">
        <p>暂无活动记录</p>
        <p style="font-size:13px;margin-top:8px">登录会话、上传文件等操作会显示在这里</p>
      </div>
    </div>
  </div>

  <!-- Terminal tab -->
  <div class="tab-content" id="tab-terminal">
    <div id="terminal-wrap"><div id="terminal-container"></div></div>
    <div id="toolbar" style="display:none"><div id="toolbar-row"></div></div>
    <div id="mod-row" style="display:none"><div id="mod-row-inner"></div></div>
  </div>

  <!-- Sessions tab -->
  <div class="tab-content" id="tab-sessions">
    <div id="sessions-panel">
      <div id="fp-section" style="display:none;padding:10px;margin-bottom:10px;background:#161b22;border:1px solid #30363d;border-radius:6px">
        <button id="fp-toggle-btn" style="width:100%;padding:12px;background:#0d1117;color:#58a6ff;border:1px solid #30363d;border-radius:6px;font-size:15px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4"/><path d="M14 13.12c0 2.38 0 6.38-1 8.88"/><path d="M17.29 21.02c.12-.6.43-2.3.5-3.02"/><path d="M2 12a10 10 0 0 1 18-6"/><path d="M2 16h.01"/><path d="M21.8 16c.2-2 .131-5.354 0-6"/><path d="M5 19.5C5.5 18 6 15 6 12a6 6 0 0 1 .34-2"/><path d="M8.65 22c.21-.66.45-1.32.57-2"/><path d="M9 6.8a6 6 0 0 1 9 5.2v2"/></svg>
          <span id="fp-toggle-text">🔒 启用指纹登录</span>
        </button>
      </div>
      <div class="create-row">
        <input id="new-session-name" placeholder="session name (e.g. web-work)">
        <button class="btn btn-green" id="create-session-btn">+ New</button>
      </div>
      <div id="sessions-list"></div>
    </div>
  </div>

  <!-- Plugins tab - Plugin List + File Manager -->
  <div class="tab-content" id="tab-plugins">
    <div id="plugin-panel">
      <!-- Plugin list view -->
      <div id="plugin-list-view">
        <div class="plugin-card" data-plugin="file-manager">
          <div class="plugin-card-header">
            <span class="plugin-icon">📁</span>
            <div class="plugin-info">
              <h3>文件管理器</h3>
              <p>上传、下载、删除文件和文件夹</p>
            </div>
            <span class="plugin-arrow">▶</span>

<script>
// UMD bundles: Terminal and FitAddon are globals from <script src> above

const $=id=>document.getElementById(id);
const loginView=$('login-view'), appView=$('app-view');
const status=$('status-text'), modStatus=$('mod-status');
const disconnectOverlay=$('disconnect-overlay'), disconnectReason=$('disconnect-reason');
let ws=null, term=null, fitAddon=null;
let activeModifiers=new Set();
let ptySizeSent=false;
let currentSession=null;
let wsTimeoutSec=300;

// Fetch config from server
fetch('/api/config').then(r=>r.ok?r.json():{}).then(c=>{if(c.ws_timeout_sec)wsTimeoutSec=c.ws_timeout_sec}).catch(()=>{});
let wsTimeoutTimer=null;

// ─── Plugin Registry ───
const plugins=[];
function registerPlugin(p){ plugins.push(p); p.init?.({send,sendKey,api}); }
function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  return fetch(path,opts).then(r=>r.ok?r.json():Promise.reject(r));
}

// ─── Escape sequences ───
const E='\x1b';
const SEQ={Esc:E,Tab:'\t',Enter:'\r',Bksp:'\x7f',Up:E+'[A',Down:E+'[B',Right:E+'[C',Left:E+'[D',Home:E+'[H',End:E+'[F',PgUp:E+'[5~',PgDn:E+'[6~',Ins:E+'[2~',Del:E+'[3~',F1:E+'OP',F2:E+'OQ',F3:E+'OR',F4:E+'OS',F5:E+'[15~',F6:E+'[17~',F7:E+'[18~',F8:E+'[19~',F9:E+'[20~',F10:E+'[21~',F11:E+'[23~',F12:E+'[24~'};

function send(d){if(ws?.readyState===WebSocket.OPEN)ws.send(d)}
function sendKey(k){
  if(!ws||ws.readyState!==WebSocket.OPEN)return;
  let d='';
  if(SEQ[k]){
    if(activeModifiers.has('Ctrl')&&['Up','Down','Right','Left'].includes(k)){
      d=E+'[1;'+{Up:'5A',Down:'5B',Right:'5C',Left:'5D'}[k];
    }else d=SEQ[k];
  }else if(k.length===1&&activeModifiers.has('Ctrl')){
    const c=k.toUpperCase().charCodeAt(0);
    d=c>=65&&c<=90?String.fromCharCode(c-64):k;
  }else d=k;
  ws.send(d);
}

// ─── Tabs ───
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    $('tab-'+t.dataset.tab).classList.add('active');
    if(t.dataset.tab==='activity') loadActivities();
    if(t.dataset.tab==='sessions') loadSessionsList();
    if(t.dataset.tab==='plugins') renderPlugins();
  });
});


// ─── Modifier row (Termux-style) ───
const MODIFIERS=[
  {id:'Ctrl',label:'Ctrl',persistent:true},
  {id:'Alt',label:'Alt',persistent:true},
  {id:'Esc',label:'Esc',persistent:false},
  {id:'Tab',label:'Tab',persistent:false},
];
const modRowInner=$('mod-row-inner');
function buildModRow(){
  modRowInner.innerHTML='';
  for(const m of MODIFIERS){
    const el=document.createElement('button');
    el.className='key'+(m.persistent?'':' special');
    el.textContent=m.label;
    el.addEventListener('click',()=>{
      if(m.persistent){
        activeModifiers.has(m.id)?activeModifiers.delete(m.id):activeModifiers.add(m.id);
        el.classList.toggle('active-mod');
        updateModStatus();
      }else{sendKey(m.id)}
    });
    if(m.persistent){
      let last=0;
      el.addEventListener('click',()=>{
        if(Date.now()-last<300){
          activeModifiers.clear();
          modRowInner.querySelectorAll('.key').forEach(k=>k.classList.remove('active-mod'));
          updateModStatus();
        }
        last=Date.now();
      });
    }
    modRowInner.appendChild(el);
  }
}
function updateModStatus(){modStatus.textContent=[...activeModifiers].join('+')?`[${[...activeModifiers].join('+')}]`:''}

function sendSeq(...bytes){
  if(!ws||ws.readyState!==WebSocket.OPEN)return;
  bytes.forEach((b,i)=>setTimeout(()=>ws.send(b),i*30));
}

// ─── Toolbar ───
// Order: prefix → window nav → scroll → pane → copy/paste → session → Ctrl keys → Nav → Special
let copyModeActive=false;
const TOOLBAR_GROUPS=[
  {name:'tmux prefix',keys:[{label:'⌃B',send:'\x02',title:'tmux prefix'}]},
  {name:'tmux window',keys:[{label:'◀Win',combo:'\x02p',title:'prev window'},{label:'Win▶',combo:'\x02n',title:'next window'}]},
  {name:'tmux scroll',keys:[{label:'▲Buf',action:'toggleBuf',title:'toggle copy mode ↑'},{label:'▼Buf',action:'toggleBufDown',title:'toggle copy mode ↓'},{label:'PgUp',send:SEQ.PgUp},{label:'PgDn',send:SEQ.PgDn},{label:'NewWin',combo:'\x02c',title:'new window'}]},
  {name:'tmux pane',keys:[{label:'|Pane',combo:'\x02%',title:'split vertical'},{label:'—Pane',combo:'\x02"',title:'split horizontal'},{label:'◀Pane',combo:'\x02{LEFT}',title:'focus left pane'},{label:'Pane▶',combo:'\x02{RIGHT}',title:'focus right pane'},{label:'Kill○',combo:'\x02x',title:'kill pane'},{label:'Zoom',combo:'\x02z',title:'zoom pane'}]},
  {name:'tmux copy',keys:[{label:'Copy',combo:'\x02[',title:'copy mode'},{label:'Paste',combo:'\x02]',title:'paste buffer'}]},
  {name:'tmux session',keys:[{label:'Kill',combo:'\x02&',title:'kill window'},{label:'List',combo:'\x02w',title:'list windows'},{label:'Detach',combo:'\x02d',title:'detach'},{label:'Switch',combo:'\x02s',title:'list sessions'}]},
  {name:'Ctrl keys',keys:[{label:'⌃C',send:'\x03',title:'interrupt'},{label:'⌃D',send:'\x04',title:'EOF'},{label:'⌃Z',send:'\x1a',title:'suspend'},{label:'⌃L',send:'\x0c',title:'clear'},{label:'⌃R',send:'\x12',title:'reverse search'},{label:'⌃A',send:'\x01',title:'begin line'},{label:'⌃E',send:'\x05',title:'end line'},{label:'⌃K',send:'\x0b',title:'kill line'},{label:'⌃U',send:'\x15',title:'kill all'},{label:'⌃W',send:'\x17',title:'kill word'}]},
  {name:'Nav',keys:[{label:'↑',send:SEQ.Up},{label:'↓',send:SEQ.Down},{label:'←',send:SEQ.Left},{label:'→',send:SEQ.Right},{label:'Home',send:SEQ.Home},{label:'End',send:SEQ.End}]},
  {name:'Special',keys:[{label:'Esc',send:SEQ.Esc},{label:'Tab',send:'\t'},{label:'Bksp',send:'\x7f'},{label:'Enter',send:'\r'},{label:'Space',send:' '},{label:'~',send:'~'},{label:'/',send:'/'},{label:'|',send:'|'}]},
];
const toolbarRow=$('toolbar-row');

function buildToolbar(){
  toolbarRow.innerHTML='';
  for(const g of TOOLBAR_GROUPS){
    const sep=document.createElement('div');
    sep.style.cssText='width:1px;background:#30363d;margin:2px 4px;flex-shrink:0';
    toolbarRow.appendChild(sep);
    for(const k of g.keys){
      const el=document.createElement('button');
      el.className='key';if(k.send==='\x02')el.classList.add('prefix-key');
      el.textContent=k.label;if(k.title)el.title=k.title;
      if(k.action){
        el.dataset.action=k.action;
        el.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();doScrollAction(k.action)});
      }else if(k.combo){
        el.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();if(!ws||ws.readyState!==WebSocket.OPEN)return;for(const p of parseCombo(k.combo))ws.send(p)});
      }else{
        el.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();sendKey(k.send||k.label)});
      }
      el.addEventListener('mousedown',e=>e.preventDefault());
      toolbarRow.appendChild(el);
    }
  }
}

function parseCombo(c){
  const p=[];let i=0;
  while(i<c.length){
    if(c[i]==='\x02'){p.push('\x02');i++}
    else if(c[i]==='{'){const e=c.indexOf('}',i);if(e===-1){p.push(c.slice(i));break}const n=c.slice(i+1,e);if(SEQ[n])p.push(SEQ[n]);i=e+1}
    else{p.push(c[i]);i++}
  }return p;
}

function doScrollAction(action){
  if(!ws||ws.readyState!==WebSocket.OPEN)return;
  const isToggle=action==='toggleBuf'||action==='toggleBufDown';
  if(isToggle){
    if(copyModeActive){
      // Exit copy mode
      ws.send('q');
      copyModeActive=false;
      document.querySelectorAll('.key.buf-active').forEach(el=>el.classList.remove('buf-active'));
    }else{
      // Enter copy mode + scroll
      sendSeq('\x02[',action==='toggleBuf'?'k':'j');
      copyModeActive=true;
      document.querySelectorAll('[data-action="toggleBuf"],[data-action="toggleBufDown"]').forEach(el=>el.classList.add('buf-active'));
    }
    return;
  }
  switch(action){
    case 'scrollUp':  sendSeq('\x02[','k','k','k','k','k'); break;
    case 'scrollDown':sendSeq('\x02[','j','j','j','j','j'); break;
    case 'scrollTop': sendSeq('\x02[','g'); break;
    case 'scrollBottom':sendSeq('\x02[','G'); break;
  }
}

// Reset copy mode state on WebSocket reconnect
function resetCopyMode(){copyModeActive=false;document.querySelectorAll('.key.buf-active').forEach(el=>el.classList.remove('buf-active'));}

// ─── Login ───
$('login-btn').addEventListener('click',doLogin);
$('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
$('login-totp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

async function doLogin(){
  const btn=$('login-btn'),errEl=$('login-error'),okEl=$('login-success');
  const password=$('login-pass').value.trim(),totpCode=$('login-totp').value.trim();
  errEl.textContent='';okEl.textContent='';
  $('login-pass').classList.remove('error');$('login-totp').classList.remove('error');
  if(!password){
    errEl.innerHTML='<span class="error-icon">⚠</span>请输入密码';
    $('login-pass').classList.add('error');$('login-pass').focus();return;
  }
  btn.disabled=true;btn.classList.add('loading');
  try{
    const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password,totp_code:totpCode})});
    if(res.ok){
      okEl.innerHTML='✓ 登录成功，正在进入...';
      btn.innerHTML='<span class="spinner" style="display:inline-block"></span><span class="btn-text">进入中...</span>';
      setTimeout(()=>showApp(),300);
    }else if(res.status===429){
      errEl.innerHTML='<span class="error-icon">🚫</span>尝试次数过多，请稍后再试';
      $('login-pass').classList.add('error');
    }else if(res.status===401){
      const msg=await res.text().catch(()=>'');
      if(msg.includes('TOTP')){errEl.innerHTML='<span class="error-icon">⚠</span>TOTP 验证码错误';$('login-totp').classList.add('error');$('login-totp').focus()}
      else{errEl.innerHTML='<span class="error-icon">✗</span>密码错误，请重新输入';$('login-pass').classList.add('error');$('login-pass').focus()}
    }else{errEl.innerHTML=`<span class="error-icon">✗</span>服务器错误 (${res.status})`}
  }catch(e){errEl.innerHTML='<span class="error-icon">✗</span>网络错误，请检查连接'}
  finally{btn.disabled=false;btn.classList.remove('loading');if(!okEl.textContent)btn.innerHTML='<span class="spinner"></span><span class="btn-text">Login</span>'}
}

async function checkSession(){try{const r=await fetch('/api/sessions');if(r.ok)showApp()}catch(e){}}

function showApp(){
  loginView.style.display='none';appView.style.display='flex';
  $('toolbar').style.display='block';$('mod-row').style.display='block';
  buildToolbar();buildModRow();initTerminal();loadSessionsList();
  updateFpButton();
  loadActivities(); // Load activity feed on app start
}

function initTerminal(){
  if(term)return;
  term=new Terminal({cursorBlink:true,fontSize:14,fontFamily:"'Cascadia Code','Fira Code',Menlo,Monaco,'Courier New',monospace",scrollback:5000,theme:{background:'#0d1117'}});
  const FA=FitAddon.FitAddon||FitAddon;
  fitAddon=new FA();term.loadAddon(fitAddon);
  term.open($('terminal-container'));
  requestAnimationFrame(()=>fitAddon.fit());
  // Click terminal area = focus → keyboard on mobile
  $('terminal-container').addEventListener('click',()=>term.focus());
}

// ─── Disconnect overlay ───
let wsCloseReason='';
function showDisconnectOverlay(reason,code){
  wsCloseReason=reason||'';
  disconnectReason.textContent=reason||'';
  // timeout/network → reconnect WS; server-kick/other → refresh page
  if(code===4000||code===1006||code===1001){
    disconnectOverlay.querySelector('.overlay-btn').textContent='重新连接';
    disconnectOverlay.querySelector('.overlay-btn').dataset.action='reconnect';
  }else{
    disconnectOverlay.querySelector('.overlay-btn').textContent='刷新页面';
    disconnectOverlay.querySelector('.overlay-btn').dataset.action='refresh';
  }
  disconnectOverlay.classList.add('show');
}
function hideDisconnectOverlay(){disconnectOverlay.classList.remove('show')}

$('reconnect-btn').addEventListener('click',()=>{
  const action=disconnectOverlay.querySelector('.overlay-btn').dataset.action;
  hideDisconnectOverlay();
  if(action==='refresh'){
    location.reload();
    return;
  }
  // reconnect: just re-create WS, keep terminal
  if(currentSession&&fitAddon){
    connect(currentSession);
  }else{
    location.reload();
  }
});

// ─── WS timeout reset ───
function resetWsTimeout(){
  if(wsTimeoutTimer)clearTimeout(wsTimeoutTimer);
  if(ws?.readyState===WebSocket.OPEN){
    wsTimeoutTimer=setTimeout(()=>{
      if(ws)ws.close(4000,'timeout');
    },wsTimeoutSec*1000);
  }
}



// ─── Activity management ───
const ACTIVITY_ICONS = {
  login: ' ',
  logout: ' ',
  session: ' ',
  file_upload: ' ',
  file_delete: ' ️',
  mkdir: ' '
};

const ACTIVITY_LABELS = {
  login: '登录',
  logout: '登出',
  session: '会话',
  file_upload: '上传文件',
  file_delete: '删除文件',
  mkdir: '创建文件夹'
};

function formatActivityTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
  if (diff < 604800) return Math.floor(diff / 86400) + ' 天前';
  
  return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

async function loadActivities() {
  const el = $('activity-list');
  const empty = $('activity-empty');
  el.innerHTML = '';
  
  try {
    const acts = await api('GET', '/api/activities');
    if (!acts || acts.length === 0) {
      el.style.display = 'none';
      empty.style.display = 'block';
      return;
    }
    
    el.style.display = 'block';
    empty.style.display = 'none';
    
    acts.forEach(act => {
      const item = document.createElement('div');
      item.className = 'activity-item';
      
      const icon = ACTIVITY_ICONS[act.type] || ' ';
      const label = ACTIVITY_LABELS[act.type] || act.type;
      
      let detailHtml = '';
      if (act.detail) detailHtml += `<div class="activity-detail">${esc(act.detail)}</div>`;
      if (act.session) detailHtml += `<div class="activity-path">会话: ${esc(act.session)}</div>`;
      if (act.path) detailHtml += `<div class="activity-path">路径: ${esc(act.path)}</div>`;
      
      item.innerHTML = `
        <span class="activity-icon ${act.type}">${icon}</span>
        <div class="activity-content">
          <div class="activity-title">${label}</div>
          <div class="activity-time">${formatActivityTime(act.timestamp)}</div>
          ${detailHtml}
        </div>
      `;
      
      // Click to navigate
      item.addEventListener('click', () => {
        if (act.type === 'session' && act.session) {
          // Switch to terminal and connect to session
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
          document.querySelector('[data-tab="terminal"]').classList.add('active');
          $('tab-terminal').classList.add('active');
          connectSession(act.session);
        } else if (act.type === 'file_upload' || act.type === 'mkdir') {
          // Switch to plugins and open file manager
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
          document.querySelector('[data-tab="plugins"]').classList.add('active');
          $('tab-plugins').classList.add('active');
          renderPlugins();
        }
      });
      
      el.appendChild(item);
    });
  } catch(e) {
    el.innerHTML = '<div style="color:#f85149;text-align:center;padding:20px">加载活动记录失败</div>';
  }
}

$('refresh-activity').addEventListener('click', loadActivities);


// ─── Session management ───
async function loadSessionsList(){
  const el=$('sessions-list');el.innerHTML='';
  try{
    const ss=await api('GET','/api/sessions');
    if(!ss||ss.length===0){el.innerHTML='<div style="color:#8b949e;text-align:center;padding:24px">No sessions. Create one above.</div>';return}
    ss.forEach(s=>{
      const card=document.createElement('div');
      card.className='session-card'+(s.attached>0?' attached':'');
      card.innerHTML=`<div><div class="name">${esc(s.name)}</div><div class="info">${s.windows} windows · ${s.attached} attached</div></div><div class="actions"><button class="btn btn-blue btn-connect" data-name="${esc(s.name)}">Connect</button><button class="btn btn-red btn-kill" data-name="${esc(s.name)}">Kill</button></div>`;
      el.appendChild(card);
    });
    el.querySelectorAll('.btn-connect').forEach(b=>b.addEventListener('click',()=>connectSession(b.dataset.name)));
    el.querySelectorAll('.btn-kill').forEach(b=>b.addEventListener('click',()=>showKillModal(b.dataset.name)));;
  }catch(e){el.innerHTML='<div style="color:#f85149">Failed to load sessions</div>'}
}

$('create-session-btn').addEventListener('click',async()=>{

let fmCurrentPath='/';
async function fmLoadDir(path){
  try{
    const r=await fetch('/api/files?action=list&path='+encodeURIComponent(path));
    if(!r.ok){const e=await r.json();$('fm-status').textContent='Error: '+e.error;return}

    // Sort: dirs first, then by name
    const entries=d.entries.sort((a,b)=>(a.is_dir===b.is_dir)?a.name.localeCompare(b.name):(b.is_dir-a.is_dir));
    entries.forEach(e=>{
      const div=document.createElement('div');div.className='fm-item'+(e.is_dir?' dir':'');
      const icon=e.is_dir?'📁':(e.name.match(/\.(jpg|png|gif|svg|webp)$/i)?'🖼':(e.name.match(/\.(mp4|mp3|wav|ogg)$/i)?'🎬':'📄'));

        `<span class="fm-size">${e.is_dir?'—':fmFormatSize(e.size)}</span>`+
        `<span class="fm-time">${e.mod_time}</span>`+
        `<span class="fm-del" data-path="${esc(e.path)}" data-dir="${e.is_dir}">✕</span>`;

  if(bytes<1048576)return(bytes/1024).toFixed(1)+'K';
  if(bytes<1073741824)return(bytes/1048576).toFixed(1)+'M';
  return(bytes/1073741824).toFixed(1)+'G';
}

// ─── Connection ───
function connect(name){
  hideDisconnectOverlay();
  if(ws){ws.onclose=null;ws.close()}
  currentSession=name;
  ptySizeSent=false;
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}/ws?session=${name}`);
  ws.binaryType='arraybuffer';
  ws.onopen=()=>{
    status.textContent=`Connected: ${name}`;
    requestAnimationFrame(()=>{
      const oldCols=term.cols,oldRows=term.rows;
      fitAddon.fit();
      sendResize();
      if(term.cols!==oldCols||term.rows!==oldRows)sendResize();
    });
    ptySizeSent=true;
    resetWsTimeout();
  };
  ws.onmessage=e=>{
    term.write(e.data instanceof ArrayBuffer?new Uint8Array(e.data):e.data);
    resetWsTimeout();
  };
  ws.onclose=e=>{
    status.textContent='Disconnected';
    if(wsTimeoutTimer)clearTimeout(wsTimeoutTimer);
    ws=null;
    resetCopyMode();
    if(currentSession){
      const reason=e.code===4000?'连接超时，无数据传输':
                    e.code===1006?'网络异常断开':
                    e.code===1000?'会话正常断开':
                    e.code===1001?'服务器关闭连接':
                    `连接关闭 (${e.code})`;
      showDisconnectOverlay(reason,e.code);
    }
  };
  term.onData(d=>{if(ws?.readyState===WebSocket.OPEN){ws.send(d);resetWsTimeout()}});
}

function sendResize(){
  if(!term||!ws||ws.readyState!==WebSocket.OPEN)return;
  ws.send(JSON.stringify({cols:term.cols,rows:term.rows}));
}

// Debounced resize on terminal container size changes
let resizeTimer=null;
const resizeObs=new ResizeObserver(()=>{
  if(resizeTimer)clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    if(!term||!fitAddon)return;
    const oldCols=term.cols,oldRows=term.rows;
    fitAddon.fit();
    if(term.cols!==oldCols||term.rows!==oldRows)sendResize();
  },200);
});

// ArrayBuffer to base64 (handles large buffers without stack overflow)
function bufToB64(buf){
  const bytes=new Uint8Array(buf);
  let bin='';
  for(let i=0;i<bytes.length;i+=8192){
    bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+8192));
  }
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64ToBuf(b64){
  // URL-safe base64 → standard base64
  b64=b64.replace(/-/g,'+').replace(/_/g,'/');
  while(b64.length%4)b64+='=';
  const bin=atob(b64);
  const buf=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
  return buf;
}

// Enable fingerprint registration (called from status bar button)
async function enableFingerprint(){
  try{
    const optRes=await fetch('/api/webauthn/register/start');
    if(!optRes.ok){alert('注册失败');return}
    const options=await optRes.json();
    const pk=options.publicKey||options;
    const cred=await navigator.credentials.create({
      publicKey:{
        challenge:b64ToBuf(pk.challenge),
        rp:pk.rp,user:{
          id:b64ToBuf(pk.user.id),
          name:pk.user.name,displayName:pk.user.displayName
        },
        pubKeyCredParams:pk.pubKeyCredParams,
        timeout:pk.timeout,
        authenticatorSelection:pk.authenticatorSelection||{authenticatorAttachment:'platform',userVerification:'preferred'},
        attestation:pk.attestation||'none'
      }
    });
    const finRes=await fetch('/api/webauthn/register/finish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      id:cred.id,rawId:bufToB64(cred.rawId),type:cred.type,
      response:{attestationObject:bufToB64(cred.response.attestationObject),clientDataJSON:bufToB64(cred.response.clientDataJSON)}
    })});
    if(finRes.ok){
      webauthnRegistered=true;
      updateFpButton();
      alert('指纹注册成功！下次可以直接用指纹登录');
    }else{alert('指纹注册失败')}
  }catch(e){
    if(e.name!=='NotAllowedError')alert('指纹注册失败: '+e.message);
  }
}

  const section=$('fp-section');

  }else{
    text.textContent='🔒 启用指纹登录';
    btn.style.borderColor='#30363d';
    btn.style.color='#58a6ff';
    btn.onclick=enableFingerprint;
  }
}

(async()=>{
await checkWebAuthn();
checkSession();
})();
